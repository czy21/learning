plugins {
    id 'org.springframework.boot' apply false
    id 'io.spring.dependency-management' apply false
}

ext {
    flinkVersion = '1.12.0'
    scalaBinaryVersion = '2.12'
    slf4jVersion = '1.7.15'
    log4jVersion = '1.2.17'
}
version = '0.1.0-SNAPSHOT'

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'java'
    apply plugin: 'idea'

    group = 'com.learning'
    targetCompatibility = '11'
    sourceCompatibility = '11'

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    dependencies {
        implementation "org.apache.commons:commons-lang3:3.11"
        implementation "org.openjdk.jol:jol-core:0.9"
        implementation "cglib:cglib:3.3.0"

        compileOnly "org.mapstruct:mapstruct:1.3.1.Final"
        annotationProcessor "org.mapstruct:mapstruct-processor:1.3.1.Final"
        compileOnly "org.projectlombok:lombok:1.18.10"
        annotationProcessor "org.projectlombok:lombok:1.18.10"
        testCompileOnly "org.mapstruct:mapstruct:1.3.1.Final"
        testAnnotationProcessor "org.mapstruct:mapstruct-processor:1.3.1.Final"
        testCompileOnly "org.projectlombok:lombok:1.18.10"
        testAnnotationProcessor "org.projectlombok:lombok:1.18.10"

        testImplementation 'org.junit.jupiter:junit-jupiter-api:5.7.1'
        testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    }
    test {
        useJUnitPlatform()
    }
}

this.getSubprojects().forEach(p -> {
    if (p.name.startsWith("spring")) {
        p.apply plugin: 'org.springframework.boot'
        p.apply plugin: 'io.spring.dependency-management'
    }
})